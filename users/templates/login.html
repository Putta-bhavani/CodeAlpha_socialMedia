{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>

        body{
            background:#f0f2f5;
            font-family:Arial;
        }

        .box{
            width:350px;
            margin:80px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#1877f2;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="box">

<h2>Login</h2>

{% if messages %}
    {% for message in messages %}
        <p style="color:red">{{message}}</p>
    {% endfor %}
{% endif %}

<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="username"
        placeholder="Username"
        required
    >

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <button type="submit">Login</button>
    <p style="text-align:center;">
    Don't have an account?
    <a href="{% url 'register' %}">
        Register
    </a>
</p>

</form>

</div>

</body>
</html>
