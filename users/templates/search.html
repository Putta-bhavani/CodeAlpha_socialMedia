{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Search Users</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<h2>Search Users</h2>

<form method="GET">

    <input
        type="text"
        name="q"
        placeholder="Search username..."
        value="{{ query }}"
    >

    <button type="submit">
        Search
    </button>

</form>

<hr>

{% for user in users %}

<p>

{{ user.username }}

<a href="{% url 'follow_user' user.id %}">
Follow / Unfollow
</a>

</p>

{% empty %}

<p>No Users Found</p>

{% endfor %}

<br>

<a href="{% url 'home' %}">
Home
</a>

</body>
</html>
